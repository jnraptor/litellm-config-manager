# Model Mappings for LiteLLM Config
# Define canonical model names that map to provider-specific IDs
#
# Usage:
#   python cleanup_models.py --provider all --add-mapped-model glm-5
#
# This will add the model from all configured providers with the same display name

models:
  # Example: GLM-5 model from Z.ai
  glm-5:
    display_name: "zai-glm-5"  # Common display name across all providers
    description: "GLM-5 model by Z.ai"
    providers:
      openrouter: z-ai/glm-5
      fireworks: accounts/fireworks/models/glm-5
      # Add other providers as needed:
      # kilo: z-ai/glm-5

  nemotron-3-super:
    display_name: "nvidia-nemotron-3-super"
    description: "nemotron-3-super-120b-a12b"
    providers:
      openrouter: nvidia/nemotron-3-super-120b-a12b:free
      nvidia: nvidia/nemotron-3-super-120b-a12b
      ollama: nemotron-3-super

  nemotron-3-nano-omni:
    display_name: "nemotron-3-nano-omni"
    description: "Nemotron 3 Nano Omni is an omni-modal reasoning model that understands images, video, speech, text."
    providers:
      openrouter: nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free
      nvidia: nvidia/nemotron-3-nano-omni-30b-a3b-reasoning
      #ollama: nemotron-3-super

  mimo-v2.5:
    display_name: "mimo-v2.5"
    description: "mimo-v2.5"
    providers:
      openrouter: xiaomi/mimo-v2.5
      kilo: xiaomi/mimo-v2.5
      #nvidia: nvidia/nemotron-3-super-120b-a12b
      poe: mimo-v2.5
      #ollama: minimax-m2.7
      vercel: xiaomi/mimo-v2.5

  mimo-v2.5-pro:
    display_name: "mimo-v2.5-pro"
    description: "mimo-v2.5-pro"
    providers:
      openrouter: xiaomi/mimo-v2.5-pro
      kilo: xiaomi/mimo-v2.5-pro
      #nvidia: nvidia/nemotron-3-super-120b-a12b
      poe: mimo-v2.5-pro
      #ollama: minimax-m2.7
      vercel: xiaomi/mimo-v2.5-pro

  moonshotai-kimi-k2.5:
    display_name: "moonshotai-kimi-k2.5"  # Common display name across all providers
    description: "GLM-5 model by Z.ai"
    providers:
      openrouter: moonshotai/kimi-k2.5
      kilo: moonshotai/kimi-k2.5
      fireworks: accounts/fireworks/models/kimi-k2p5
      ollama: kimi-k2.5
      poe: kimi-k2.5-fw
      nvidia: moonshotai/kimi-k2.5

  moonshotai-kimi-k2.6:
    display_name: "moonshotai-kimi-k2.6"  # Common display name across all providers
    description: "GLM-5 model by Z.ai"
    providers:
      openrouter: moonshotai/kimi-k2.6
      kilo: moonshotai/kimi-k2.6
      fireworks: accounts/fireworks/models/kimi-k2p6
      #ollama: kimi-k2.6
      poe: kimi-k2.6-fw
