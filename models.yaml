# Model Mappings for LiteLLM Config
# Define canonical model names that map to provider-specific IDs
#
# Usage:
#   python cleanup_models.py --provider all --add-mapped-model glm-5
#
# This will add the model from all configured providers with the same display name

models:
  # Example: GLM-5 model from Z.ai
  glm-5:
    display_name: "zai-glm-5"  # Common display name across all providers
    description: "GLM-5 model by Z.ai"
    providers:
      openrouter: z-ai/glm-5
      fireworks: accounts/fireworks/models/glm-5
      # Add other providers as needed:
      # novita: glm-5
      # kilo: z-ai/glm-5

  nemotron-3-super:
    display_name: "nvidia-nemotron-3-super"
    description: "nemotron-3-super-120b-a12b"
    providers:
      openrouter: nvidia/nemotron-3-super-120b-a12b:free
      nvidia: nvidia/nemotron-3-super-120b-a12b
      ollama: nemotron-3-super

  mimo-v2-pro:
    display_name: "mimo-v2-pro"
    description: "mimo-v2-pro"
    providers:
      openrouter: xiaomi/mimo-v2-pro
      kilo: xiaomi/mimo-v2-pro
      #nvidia: nvidia/nemotron-3-super-120b-a12b
      poe: mimo-v2-pro
      #ollama: minimax-m2.7
      vercel: xiaomi/mimo-v2-pro

  moonshotai-kimi-k2.5:
    display_name: "moonshotai-kimi-k2.5"  # Common display name across all providers
    description: "GLM-5 model by Z.ai"
    providers:
      openrouter: moonshotai/kimi-k2.5
      kilo: moonshotai/kimi-k2.5
      fireworks: accounts/fireworks/models/kimi-k2p5
      ollama: kimi-k2.5
      poe: kimi-k2.5-fw
      nvidia: moonshotai/kimi-k2.5

  # Add your own mappings below following this format:
  # canonical-name:
  #   display_name: "Display Name"
  #   description: "Optional description"
  #   providers:
  #     provider1: provider1/model-id
  #     provider2: provider2/model-id
